kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: argocd-practice
nodes:
- role: control-plane
  image: kindest/node:v1.35.0
  # NodePort 서비스를 localhost에서 접근하기 위한 포트 매핑
  extraPortMappings:
  - containerPort: 30950 # argocd-server (https)
    hostPort: 30950
  - containerPort: 30951
    hostPort: 30951
  - containerPort: 30960
    hostPort: 30960
  - containerPort: 30961
    hostPort: 30961
  - containerPort: 30962
    hostPort: 30962
- role: worker
  image: kindest/node:v1.35.0
