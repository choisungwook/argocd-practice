apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-env-nginx
  labels:
    app.kubernetes.io/name: multi-env-nginx
    app.kubernetes.io/part-of: argocd-applicationset-example
    environment: prod
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: multi-env-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multi-env-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.25
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
